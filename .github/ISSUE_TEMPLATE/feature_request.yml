name: Feature request
description: Propose an improvement or a new capability for Q-Lab
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem first, then the proposed improvement.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What workflow is blocked or inefficient today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include model types, deployment target, or integration constraints if relevant.
